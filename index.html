<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhật ký cảm xúc</title>
<style>
body{font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#ffd6e7,#e8d8ff,#fff5fa);margin:0;padding:20px;color:#555}
.container{max-width:1200px;margin:auto}
h1{text-align:center;color:#ff5c8a}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.08);margin-bottom:20px}
.calendar{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.day{background:#fff7fb;border:2px solid #ffd6e7;border-radius:14px;padding:10px}
select,textarea{width:100%;border:1px solid #f3bfd3;border-radius:10px;padding:8px;box-sizing:border-box}
textarea{height:60px;resize:vertical}
button{background:#ff77a9;color:white;border:none;padding:10px 15px;border-radius:10px;cursor:pointer}
.stat{background:#fff0f7;padding:8px;border-radius:10px;margin:6px 0}
.fall{position:fixed;top:-20px;animation:fall linear infinite;opacity:.7}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
#status{text-align:center;font-size:13px;color:#aaa;margin-top:-8px;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<h1>🌸 Nhật Ký Cảm Xúc Tháng 🌸</h1>
<div id="status">Đang kết nối Firebase...</div>

<div class="card">
<h2>📅 Lịch cảm xúc</h2>
<div id="calendar" class="calendar"></div>
<br>
<button onclick="exportCSV()">📄 Xuất CSV</button>
<button onclick="resetData()">🗑️ Xóa dữ liệu</button>
</div>

<div class="card">
<h2>📊 Thống kê tháng</h2>
<div id="stats"></div>
</div>
</div>

<!-- Firebase SDK (compat version - dễ dùng với script thường, không cần module) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<script>
/* ============================================
   ⚠️ DÁN CONFIG FIREBASE CỦA BẠN VÀO ĐÂY ⚠️
   Lấy từ: Firebase Console > Project settings > Your apps
   ============================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDVsR4YD3PR4hhJi4VoXnXntO5U84oAovU",
  authDomain: "my-emotion-c398c.firebaseapp.com",
  projectId: "my-emotion-c398c",
  storageBucket: "my-emotion-c398c.firebasestorage.app",
  messagingSenderId: "495814169506",
  appId: "1:495814169506:web:c75affbff9814777c158fb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const emotions=["😍 Rất vui","🥰 Hạnh phúc","😊 Vui","😌 Bình yên","🤩 Phấn khích","😴 Mệt mỏi","😢 Buồn","😭 Khóc nhiều","😤 Căng thẳng","😡 Tức giận","🤔 Suy tư","😎 Tự tin"];

const now = new Date();
const year = now.getFullYear();
const month = now.getMonth()+1; // 1-12
const days = new Date(year, month, 0).getDate();

// ID document cho tháng hiện tại, ví dụ "2026_6"
const docId = `${year}_${month}`;
const docRef = db.collection("diary").doc(docId);

// Cache dữ liệu cục bộ, đồng bộ realtime với Firestore
let monthData = {}; // { "1": {emo, note}, "2": {...}, ... }
let isFirstLoad = true;

function setStatus(text, color){
  const s = document.getElementById("status");
  s.textContent = text;
  if(color) s.style.color = color;
}

// Lắng nghe realtime: mỗi khi dữ liệu trên Firestore đổi (kể cả từ thiết bị khác), tự cập nhật UI
docRef.onSnapshot(
  (snap) => {
    monthData = (snap.exists && snap.data().days) ? snap.data().days : {};
    setStatus("✅ Đã đồng bộ với Firebase", "#7bc47f");
    build(); // vẽ lại lịch + thống kê mỗi khi có dữ liệu mới
    if(isFirstLoad){ isFirstLoad = false; }
  },
  (err) => {
    console.error(err);
    setStatus("⚠️ Lỗi kết nối Firebase: " + err.message, "#e05c5c");
  }
);

function build(){
 let c=document.getElementById("calendar");
 c.innerHTML = "";
 for(let i=1;i<=days;i++){
   let entry = monthData[i] || {};
   let e = entry.emo || "";
   let n = entry.note || "";
   let opts='<option value="">--Chọn cảm xúc--</option>';
   emotions.forEach(x=>opts+=`<option ${x===e?'selected':''}>${x}</option>`);
   c.innerHTML+=`<div class="day">
   <b>Ngày ${i}</b><br><br>
   <select onchange="saveE(${i},this.value)">${opts}</select><br><br>
   <textarea placeholder="Ghi chú..." onkeyup="saveN(${i},this.value)">${n}</textarea>
   </div>`;
 }
 stats();
 sakura();
}

// Lưu cảm xúc của 1 ngày lên Firestore (chỉ cập nhật field của ngày đó)
function saveE(d, v){
  docRef.set({
    days: { [d]: { emo: v, note: (monthData[d] && monthData[d].note) || "" } }
  }, { merge: true }).catch(err => setStatus("⚠️ Lỗi lưu: "+err.message, "#e05c5c"));
}

function saveN(d, v){
  docRef.set({
    days: { [d]: { emo: (monthData[d] && monthData[d].emo) || "", note: v } }
  }, { merge: true }).catch(err => setStatus("⚠️ Lỗi lưu: "+err.message, "#e05c5c"));
}

function stats(){
 let cnt={}; emotions.forEach(e=>cnt[e]=0);
 let total=0;
 for(let i=1;i<=days;i++){
   let e = monthData[i] && monthData[i].emo;
   if(e){cnt[e]++;total++;}
 }
 let h=`<p>💕 Đã ghi nhận <b>${total}/${days}</b> ngày</p>`;
 emotions.forEach(e=>{
  if(cnt[e]>0){
   h+=`<div class="stat">${e}: <b>${cnt[e]}</b> lần (${(cnt[e]/total*100).toFixed(1)}%)</div>`;
  }
 });
 document.getElementById("stats").innerHTML=h;
}

function exportCSV(){
 let csv="Ngay,Cam Xuc,Ghi Chu\n";
 for(let i=1;i<=days;i++){
  let entry = monthData[i] || {};
  csv+=`${i},"${entry.emo||''}","${entry.note||''}"\n`;
 }
 let blob=new Blob([csv],{type:"text/csv"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="nhat_ky_cam_xuc.csv";
 a.click();
}

function resetData(){
 if(confirm("Xóa toàn bộ dữ liệu tháng này trên Firebase?")){
   docRef.set({ days: {} })
     .then(()=> setStatus("🗑️ Đã xóa dữ liệu", "#aaa"))
     .catch(err => setStatus("⚠️ Lỗi xóa: "+err.message, "#e05c5c"));
 }
}

function sakura(){
 // tránh tạo trùng hoa khi build() gọi lại nhiều lần
 document.querySelectorAll(".fall").forEach(el=>el.remove());
 for(let i=0;i<25;i++){
   let s=document.createElement("div");
   s.className="fall";
   s.innerHTML="🌸";
   s.style.left=Math.random()*100+"vw";
   s.style.animationDuration=(5+Math.random()*8)+"s";
   s.style.fontSize=(16+Math.random()*20)+"px";
   document.body.appendChild(s);
 }
}
</script>
</body>
</html>
